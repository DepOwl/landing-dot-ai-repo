<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Court reporters">
  <title>Court reporters</title>
  <g fill="none" stroke="#0B2344" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- softly rounded display -->
    <path d="M20 20v-7.5A4.5 4.5 0 0 1 24.5 8h15A4.5 4.5 0 0 1 44 12.5V20" fill="#FFFDF6"/>
    <rect x="23.5" y="11.5" width="17" height="6.5" rx="2" fill="#FFFDF6" stroke-width="1.8"/>

    <!-- curved steno-writer body -->
    <path d="M16.5 20.5h31c2.5 0 4.2 1.7 4.7 4.1l4 20.2C57.4 51 52.7 56 46.4 56H17.6C11.3 56 6.6 51 7.8 44.8l4-20.2c.5-2.4 2.2-4.1 4.7-4.1Z" fill="#FFFDF6"/>

    <!-- side grips -->
    <path d="M11 25H7.8v8H10M53 25h3.2v8H54"/>

    <!-- keyboard tray contour -->
    <path d="M14.5 28.5c5-2 30-2 35 0l2.5 15.8c.6 3.8-2.3 7.2-6.2 7.2H18.2c-3.9 0-6.8-3.4-6.2-7.2l2.5-15.8Z"/>
  </g>

  <!-- accent number bar -->
  <rect x="20" y="25" width="24" height="4.5" rx="2.25" fill="#D7A42A" stroke="#0B2344" stroke-width="1.7"/>

  <!-- characteristic stenotype key banks -->
  <g fill="#D7A42A" stroke="#0B2344" stroke-width="1.45">
    <rect x="15.2" y="32" width="4.5" height="8.2" rx="2.1" transform="rotate(-5 17.45 36.1)"/>
    <rect x="20.4" y="31.4" width="4.5" height="8.8" rx="2.1" transform="rotate(-3 22.65 35.8)"/>
    <rect x="25.6" y="31" width="4.5" height="9.2" rx="2.1" transform="rotate(-1 27.85 35.6)"/>
    <rect x="33.9" y="31" width="4.5" height="9.2" rx="2.1" transform="rotate(1 36.15 35.6)"/>
    <rect x="39.1" y="31.4" width="4.5" height="8.8" rx="2.1" transform="rotate(3 41.35 35.8)"/>
    <rect x="44.3" y="32" width="4.5" height="8.2" rx="2.1" transform="rotate(5 46.55 36.1)"/>

    <rect x="14.2" y="40.6" width="5" height="7.6" rx="2.2" transform="rotate(-5 16.7 44.4)"/>
    <rect x="20" y="40.2" width="5" height="8" rx="2.2" transform="rotate(-3 22.5 44.2)"/>
    <rect x="39" y="40.2" width="5" height="8" rx="2.2" transform="rotate(3 41.5 44.2)"/>
    <rect x="44.8" y="40.6" width="5" height="7.6" rx="2.2" transform="rotate(5 47.3 44.4)"/>
  </g>

  <!-- vowel keys -->
  <g fill="#FFFDF6" stroke="#0B2344" stroke-width="1.45">
    <rect x="24.5" y="41.3" width="6.2" height="6.8" rx="2.3" transform="rotate(-1 27.6 44.7)"/>
    <rect x="31.3" y="41.3" width="6.2" height="6.8" rx="2.3" transform="rotate(1 34.4 44.7)"/>
  </g>

  <!-- subtle accent highlight -->
  <path d="M24.8 14.3h8.5" stroke="#D7A42A" stroke-width="1.8" stroke-linecap="round"/>
</svg>
